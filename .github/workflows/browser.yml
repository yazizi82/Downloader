name: 03- 🌐 مرورگر وب

on:
  workflow_dispatch:
    inputs:
      activation_key:
        description: '🔑 کلید فعالسازی - دریافت از: pay.avasam.ir/link/769793'
        required: false
        default: ''
        type: string
      url:
        description: 'URL to visit'
        required: true
        type: string

jobs:
  check-activation:
    name: "🔍 بررسی سیستم"
    runs-on: ubuntu-latest
    outputs:
      is_activated: ${{ steps.check.outputs.is_activated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cache
        id: cache-activation
        uses: actions/cache@v4
        with:
          path: .sys
          key: sys-cfg-br-${{ github.repository }}

      - name: Verify
        id: check
        run: |
          echo "========================================"
          echo "🔍 در حال بررسی..."
          echo "========================================"
          _p=".sys/browser_active"
          if [ -f "$_p" ]; then
            _s=$(cat "$_p" 2>/dev/null || echo "")
            if [ "$_s" = "1" ]; then
              echo "is_activated=true" >> $GITHUB_OUTPUT
              echo "✅ آماده"
            else
              echo "is_activated=false" >> $GITHUB_OUTPUT
              echo "🔒 نیاز به فعالسازی"
            fi
          else
            echo "is_activated=false" >> $GITHUB_OUTPUT
            echo "🔒 نیاز به فعالسازی"
          fi
          echo "========================================"

  activate:
    name: "🔐 فعالسازی"
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'false' && github.event.inputs.activation_key != ''
    runs-on: ubuntu-latest
    outputs:
      just_activated: ${{ steps.validate.outputs.valid }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: System verification
        id: validate
        run: |
          _x0="${{ github.event.inputs.activation_key }}"
          _c1=$(echo "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2tlZXBmaWxlc3MvYWN0aXZhdGUvcmVmcy9oZWFkcy9tYWluL2NoZWNrbGlzdC9idy50eHQ=" | base64 -d)

          echo "========================================"
          echo "🔐 در حال اعتبارسنجی..."
          echo "========================================"
          curl -sL "$_c1" | tr -d '\r' | grep -v '^$' > /tmp/.d0

          > /tmp/.d1
          while IFS= read -r _t; do
            _t=$(echo "$_t" | tr -d '[:space:]')
            [ -z "$_t" ] && continue
            [ ${#_t} -gt 4 ] && echo "${_t: -4}" >> /tmp/.d1 || echo "$_t" >> /tmp/.d1
          done < /tmp/.d0

          [ ${#_x0} -gt 4 ] && _x1="${_x0: -4}" || _x1="$_x0"

          echo "🔍 در حال پردازش..."

          if grep -qx "$_x1" /tmp/.d1; then
            echo ""
            echo "✅ تایید شد!"
            echo ""
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "❌ کلید نامعتبر است"
            echo ""
            echo "🛒 خرید کلید: https://pay.avasam.ir/link/769793"
            echo ""
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
          rm -f /tmp/.d0 /tmp/.d1 2>/dev/null
          echo "========================================"

      - name: Handle failure
        if: steps.validate.outputs.valid != 'true'
        run: |
          echo ""
          echo "❌ فعالسازی ناموفق"
          echo ""
          echo "🛒 خرید کلید: https://pay.avasam.ir/link/769793"
          echo ""

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          <div align="center">
          <img src="https://raw.githubusercontent.com/nikzad-avasam/notifications/refs/heads/main/assets/invalid-key.gif" alt="Invalid Key" width="250" />

          # خطا در فعالسازی
          </div>

          ---

          <div dir="rtl">

          شما کلید فعالساز وارد نکرده یا کلید وارد شده اشتباه است به همین علت امکان استفاده از این پروژه برای شما وجود ندارد.

          برای خرید کلید فعالسازی به لینک پایین مراجعه کنید.

          **نکات :**
          - کلید دائمی است.
          - وارد کردن کلید فعالسازی فقط یکبار کافی است. دفعات بعدی نیاز نیست.
          - در صورت بروز هرگونه مشکل در پیام رسان بله به ایدی @ask_here پیام دهید.

          **لینک خرید کلید فعالسازی :**

          [https://pay.avasam.ir/link/769793](https://pay.avasam.ir/link/769793)

          </div>
          EOF

          exit 1

      - name: Store config
        if: steps.validate.outputs.valid == 'true'
        run: |
          mkdir -p .sys
          echo "1" > .sys/browser_active
          echo "t=$(date -u '+%Y%m%d%H%M%S')" >> .sys/.m
          echo "u=${{ github.actor }}" >> .sys/.m

      - name: Save cache
        if: steps.validate.outputs.valid == 'true'
        uses: actions/cache/save@v4
        with:
          path: .sys
          key: sys-cfg-br-${{ github.repository }}

      - name: Complete
        if: steps.validate.outputs.valid == 'true'
        run: |
          echo ""
          echo "========================================"
          echo "✅ فعالسازی موفق"
          echo "========================================"
          echo ""

  not-activated:
    name: "⚠️ نیاز به فعالسازی"
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'false' && github.event.inputs.activation_key == ''
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo ""
          echo "========================================"
          echo "🔒 نیاز به فعالسازی"
          echo "========================================"
          echo ""
          echo "🛒 خرید کلید: https://pay.avasam.ir/link/769793"
          echo ""
          echo "========================================"

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          <div align="center">
          <img src="https://raw.githubusercontent.com/nikzad-avasam/notifications/refs/heads/main/assets/invalid-key.gif" alt="Invalid Key" width="250" />

          # خطا در فعالسازی
          </div>

          ---

          <div dir="rtl">

          شما کلید فعالساز وارد نکرده یا کلید وارد شده اشتباه است به همین علت امکان استفاده از این پروژه برای شما وجود ندارد.

          برای خرید کلید فعالسازی به لینک پایین مراجعه کنید.

          **نکات :**
          - کلید دائمی است.
          - وارد کردن کلید فعالسازی فقط یکبار کافی است. دفعات بعدی نیاز نیست.
          - در صورت بروز هرگونه مشکل در پیام رسان بله به ایدی @ask_here پیام دهید.

          **لینک خرید کلید فعالسازی :**

          [https://pay.avasam.ir/link/769793](https://pay.avasam.ir/link/769793)

          </div>
          EOF

          exit 1

  browse:
    name: "🌐 Browse Web"
    needs: [check-activation, activate]
    if: always() && !cancelled() && (needs.check-activation.outputs.is_activated == 'true' || needs.activate.outputs.just_activated == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip

      - name: Setup Node and Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Create screenshot script
        run: |
          cat > screenshot.js << 'ENDOFSCRIPT'
          const puppeteer = require('puppeteer');
          const url = process.argv[2];
          const outputPath = process.argv[3];

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });

            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
              await page.screenshot({ path: outputPath, fullPage: true });
              console.log('Screenshot saved successfully');
            } catch (err) {
              console.error('Screenshot error:', err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          ENDOFSCRIPT

      - name: Visit URL and download media
        run: |
          RAW_URL="${{ github.event.inputs.url }}"

          # Normalize URL: try HTTPS first if no protocol given
          if [[ ! "$RAW_URL" =~ ^https?:// ]]; then
            HTTPS_URL="https://$RAW_URL"
            HTTP_URL="http://$RAW_URL"

            echo "Trying HTTPS: $HTTPS_URL"
            if curl -L --connect-timeout 10 --max-time 30 -o /dev/null -s -w "%{http_code}" "$HTTPS_URL" | grep -q "200\|301\|302\|303\|307\|308"; then
              URL="$HTTPS_URL"
              echo "HTTPS works, using $URL"
            else
              echo "HTTPS failed, falling back to HTTP"
              URL="$HTTP_URL"
            fi
          else
            URL="$RAW_URL"
          fi

          echo "Visiting $URL"

          # Extract domain (remove protocol and optional www)
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}' | sed 's/^www\.//')
          # Extract protocol and domain for base URL
          PROTOCOL=$(echo "$URL" | grep -oP '^https?')
          BASE_DOMAIN_WITH_WWW=$(echo "$URL" | awk -F/ '{print $3}')
          ROOT_URL="${PROTOCOL}://${BASE_DOMAIN_WITH_WWW}"

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="pages/$DOMAIN/$TIMESTAMP"
          MEDIA_FOLDER="$FOLDER/media"
          mkdir -p "$FOLDER" "$MEDIA_FOLDER"

          # Download HTML
          echo "Downloading page HTML..."
          curl -L -A "Mozilla/5.0" -o "$FOLDER/page.html" "$URL"

          # Download favicon
          echo "Downloading favicon..."
          FAVICON_OK=false
          FAVICON_FILE=""

          # Method 1: Try /favicon.ico at root
          echo "Trying ${ROOT_URL}/favicon.ico"
          curl -L -s --max-time 10 -o "$MEDIA_FOLDER/favicon.ico" "${ROOT_URL}/favicon.ico" 2>/dev/null
          if [ -f "$MEDIA_FOLDER/favicon.ico" ] && [ -s "$MEDIA_FOLDER/favicon.ico" ]; then
            # Check if it's a valid image (not HTML error page)
            FILE_TYPE=$(file -b "$MEDIA_FOLDER/favicon.ico" 2>/dev/null || echo "")
            if [[ "$FILE_TYPE" == *"image"* ]] || [[ "$FILE_TYPE" == *"icon"* ]]; then
              FAVICON_OK=true
              FAVICON_FILE="favicon.ico"
              echo "Favicon downloaded: favicon.ico"
            else
              rm -f "$MEDIA_FOLDER/favicon.ico"
            fi
          fi

          # Method 2: Extract from HTML link tags
          if [ "$FAVICON_OK" = false ]; then
            echo "Trying to extract favicon from HTML..."
            # Look for <link rel="icon" or <link rel="shortcut icon"
            FAVICON_HREF=$(grep -oP '<link[^>]*rel=["\x27](?:shortcut )?icon["\x27][^>]*href=["\x27]\K[^"\x27]+' "$FOLDER/page.html" 2>/dev/null | head -1)
            if [ -z "$FAVICON_HREF" ]; then
              # Try reverse order (href before rel)
              FAVICON_HREF=$(grep -oP '<link[^>]*href=["\x27]\K[^"\x27]+(?=["\x27][^>]*rel=["\x27](?:shortcut )?icon)' "$FOLDER/page.html" 2>/dev/null | head -1)
            fi

            if [ -n "$FAVICON_HREF" ]; then
              echo "Found favicon link: $FAVICON_HREF"
              # Resolve relative URL
              if [[ "$FAVICON_HREF" =~ ^https?:// ]]; then
                FAVICON_URL="$FAVICON_HREF"
              elif [[ "$FAVICON_HREF" = /* ]]; then
                FAVICON_URL="${ROOT_URL}${FAVICON_HREF}"
              else
                FAVICON_URL="${ROOT_URL}/${FAVICON_HREF}"
              fi

              FAVICON_EXT="${FAVICON_HREF##*.}"
              FAVICON_EXT=$(echo "$FAVICON_EXT" | sed 's/[?#].*//' | tr '[:upper:]' '[:lower:]')
              [ -z "$FAVICON_EXT" ] || [ ${#FAVICON_EXT} -gt 5 ] && FAVICON_EXT="png"

              curl -L -s --max-time 10 -o "$MEDIA_FOLDER/favicon.${FAVICON_EXT}" "$FAVICON_URL" 2>/dev/null
              if [ -f "$MEDIA_FOLDER/favicon.${FAVICON_EXT}" ] && [ -s "$MEDIA_FOLDER/favicon.${FAVICON_EXT}" ]; then
                FAVICON_OK=true
                FAVICON_FILE="favicon.${FAVICON_EXT}"
                echo "Favicon downloaded: $FAVICON_FILE"
              fi
            fi
          fi

          # Method 3: Try Google's favicon service as fallback
          if [ "$FAVICON_OK" = false ]; then
            echo "Trying Google favicon service..."
            curl -L -s --max-time 10 -o "$MEDIA_FOLDER/favicon.png" "https://www.google.com/s2/favicons?domain=${DOMAIN}&sz=32" 2>/dev/null
            if [ -f "$MEDIA_FOLDER/favicon.png" ] && [ -s "$MEDIA_FOLDER/favicon.png" ]; then
              FAVICON_OK=true
              FAVICON_FILE="favicon.png"
              echo "Favicon downloaded from Google: favicon.png"
            fi
          fi

          echo "FAVICON_OK=$FAVICON_OK" >> $GITHUB_ENV
          echo "FAVICON_FILE=$FAVICON_FILE" >> $GITHUB_ENV

          # Take screenshot
          echo "Taking screenshot..."
          node screenshot.js "$URL" "$FOLDER/screenshot.png" && SCREENSHOT_OK=true || SCREENSHOT_OK=false

          # Extract links
          grep -oP 'href="\K[^"]*' "$FOLDER/page.html" | sort -u > "$FOLDER/all_links.txt"
          grep -oP 'src="\K[^"]*' "$FOLDER/page.html" | sort -u >> "$FOLDER/all_links.txt"
          sort -u "$FOLDER/all_links.txt" -o "$FOLDER/all_links.txt"

          # Media types to download
          MEDIA_EXT="png|jpg|jpeg|gif|svg|webp|bmp|ico|mp3|wav|ogg|flac|aac|mp4|webm|avi|mov|mkv|pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|tar|gz|7z"

          > "$FOLDER/media_links.txt"
          > "$FOLDER/other_links.txt"
          > "$FOLDER/downloaded_media.md"
          echo "## Downloaded Media Files" > "$FOLDER/downloaded_media.md"
          echo "" >> "$FOLDER/downloaded_media.md"

          # Base URL for resolving relative links
          BASE_URL="${URL%%/*}"
          BASE_DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')

          while IFS= read -r link; do
            [ -z "$link" ] && continue

            if [[ "$link" = /* ]]; then
              ABSOLUTE_URL="${ROOT_URL}${link}"
            elif [[ "$link" =~ ^https?:// ]]; then
              ABSOLUTE_URL="$link"
            else
              ABSOLUTE_URL="${ROOT_URL}/${link}"
            fi

            ext="${link##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            if echo "$ext_lower" | grep -Eq "^($MEDIA_EXT)$"; then
              echo "Downloading: $ABSOLUTE_URL"
              FILENAME=$(basename "$link" | sed 's/[?#].*//')
              [ -f "$MEDIA_FOLDER/$FILENAME" ] && FILENAME="$(date +%s)_$FILENAME"

              curl -L --retry 2 --max-time 60 -o "$MEDIA_FOLDER/$FILENAME" "$ABSOLUTE_URL" 2>/dev/null && {
                FILE_SIZE=$(stat -c%s "$MEDIA_FOLDER/$FILENAME" 2>/dev/null || echo 0)
                if [ "$FILE_SIZE" -gt 0 ]; then
                  echo "$link" >> "$FOLDER/media_links.txt"
                  if [[ "$ext_lower" =~ ^(png|jpg|jpeg|gif|svg|webp)$ ]]; then
                    echo "![$FILENAME](./media/$FILENAME)" >> "$FOLDER/downloaded_media.md"
                  else
                    echo "- [$FILENAME](./media/$FILENAME) ($(( FILE_SIZE / 1024 )) KB)" >> "$FOLDER/downloaded_media.md"
                  fi
                  echo "OK: $FILENAME"
                fi
              } || echo "Failed: $ABSOLUTE_URL"
            else
              echo "$link" >> "$FOLDER/other_links.txt"
            fi
          done < "$FOLDER/all_links.txt"

          # Build index.md
          MEDIA_COUNT=$(find "$MEDIA_FOLDER" -type f 2>/dev/null | wc -l)
          {
            echo "# Visited: $URL"
            echo "**Time:** $(date)"
            echo ""
            if [ "$FAVICON_OK" = true ] && [ -n "$FAVICON_FILE" ]; then
              echo "## Favicon"
              echo "![Favicon](./media/$FAVICON_FILE)"
              echo ""
            fi
            if [ "$SCREENSHOT_OK" = true ] && [ -f "$FOLDER/screenshot.png" ]; then
              echo "## Screenshot"
              echo "![Screenshot](./screenshot.png)"
              echo ""
            fi
            echo "## Raw HTML"
            echo "[page.html](./page.html)"
            echo ""
            echo "## Downloaded Media ($MEDIA_COUNT files)"
            if [ "$MEDIA_COUNT" -gt 0 ]; then
              cat "$FOLDER/downloaded_media.md"
            else
              echo "_No media files downloaded_"
            fi
            echo ""
            echo "## Other Links"
            if [ -s "$FOLDER/other_links.txt" ]; then
              head -50 "$FOLDER/other_links.txt" | while read -r link; do
                echo "- [$link]($link)"
              done
            fi
            echo ""
            echo "## Stats"
            echo "- Links: $(wc -l < "$FOLDER/all_links.txt")"
            echo "- Media: $MEDIA_COUNT"
          } > "$FOLDER/index.md"

          # Save variables for next steps
          echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV
          echo "MEDIA_COUNT=$MEDIA_COUNT" >> $GITHUB_ENV

          echo "Done: $MEDIA_COUNT files downloaded"

      - name: Update browse.md with numbered list and favicons
        run: |
          BROWSE_FILE="browse.md"
          FOLDER="${{ env.FOLDER }}"
          DOMAIN="${{ env.DOMAIN }}"
          FAVICON_OK="${{ env.FAVICON_OK }}"
          FAVICON_FILE="${{ env.FAVICON_FILE }}"

          # Create browse.md if it doesn't exist
          if [ ! -f "$BROWSE_FILE" ]; then
            echo "# 🌐 Browsed Websites" > "$BROWSE_FILE"
            echo "" >> "$BROWSE_FILE"
            echo "---" >> "$BROWSE_FILE"
            echo "" >> "$BROWSE_FILE"
          fi

          # Count existing entries to get next number
          ENTRY_COUNT=$(grep -cE '^\s*!\[|^🌐\s+[0-9]+-' "$BROWSE_FILE" 2>/dev/null || echo "0")
          NEXT_NUM=$((ENTRY_COUNT + 1))

          # Build the entry with favicon or emoji
          if [ "$FAVICON_OK" = "true" ] && [ -n "$FAVICON_FILE" ]; then
            # Use favicon image
            ENTRY="![favicon]($FOLDER/media/$FAVICON_FILE) ${NEXT_NUM}- [${DOMAIN}]($FOLDER/index.md)"
          else
            # Use emoji as fallback
            ENTRY="🌐 ${NEXT_NUM}- [${DOMAIN}]($FOLDER/index.md)"
          fi

          # Add entry to browse.md
          echo "" >> "$BROWSE_FILE"
          echo "$ENTRY" >> "$BROWSE_FILE"

          echo "Added entry #${NEXT_NUM}: ${DOMAIN}"

      - name: Update README.md with browser link
        run: |
          README_FILE="README.md"
          BROWSER_SECTION_TITLE="you can see websites using this : 🌐 Browser"

          # Create README.md if it doesn't exist
          if [ ! -f "$README_FILE" ]; then
            echo "# Repository" > "$README_FILE"
            echo "" >> "$README_FILE"
          fi

          # Check if browser section already exists
          if ! grep -qF "$BROWSER_SECTION_TITLE" "$README_FILE"; then
            echo "Adding browser section to README.md..."

            # Add section at the top (after first line/title)
            {
              head -1 "$README_FILE"
              echo ""
              echo "---"
              echo ""
              echo "[$BROWSER_SECTION_TITLE](browse.md)"
              echo ""
              echo "---"
              echo ""
              tail -n +2 "$README_FILE"
            } > "$README_FILE.tmp"
            mv "$README_FILE.tmp" "$README_FILE"

            echo "Browser section added to README.md"
          else
            echo "Browser section already exists in README.md"
          fi

      - name: Create zip archive of the timestamp folder
        run: |
          cd pages/$DOMAIN
          zip -r "$TIMESTAMP.zip" "$TIMESTAMP"
          cd ../..

      - name: Update pages README
        run: |
          PAGES_README="pages/README.md"
          DOMAIN="${{ env.DOMAIN }}"
          TIMESTAMP="${{ env.TIMESTAMP }}"
          FAVICON_OK="${{ env.FAVICON_OK }}"
          FAVICON_FILE="${{ env.FAVICON_FILE }}"

          # Create pages/README.md if not exists
          if [ ! -f "$PAGES_README" ]; then
            echo "# 🌐 ذخیره وبسایت‌ها" > "$PAGES_README"
            echo "" >> "$PAGES_README"
            echo "---" >> "$PAGES_README"
            echo "" >> "$PAGES_README"
          fi

          # Build entry with favicon or emoji
          if [ "$FAVICON_OK" = "true" ] && [ -n "$FAVICON_FILE" ]; then
            ICON="![$DOMAIN](./$DOMAIN/$TIMESTAMP/media/$FAVICON_FILE)"
          else
            ICON="🌐"
          fi

          # Add entry: icon domain [ visit | zip ]
          ENTRY="$ICON **$DOMAIN** — [ [مشاهده](./$DOMAIN/$TIMESTAMP/index.md) | [📦 دانلود](./$DOMAIN/$TIMESTAMP.zip) ]"

          echo "" >> "$PAGES_README"
          echo "$ENTRY" >> "$PAGES_README"

          echo "✅ Added to pages/README.md: $DOMAIN"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f pages/ pages/README.md browse.md README.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Saved page with media and screenshot [skip ci]"
          git pull --rebase
          git push
